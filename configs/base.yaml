run:
  experiment_id: bootstrap-smoke
  seed: 42
  output_dir: runs/bootstrap-smoke
data:
  input_path: data/input.jsonl
  input_format: jsonl
model:
  name_or_path: speakleash/Bielik-1.5B-v3
  revision: main
training:
  max_length: 1024
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.0001
  bf16: false
  fp16: false
generation:
  max_new_tokens: 64
  num_return_sequences: 1
tracking:
  backend: offline
  online: false
