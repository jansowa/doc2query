name: cpu-ci

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CUDA_VISIBLE_DEVICES: ""
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      WANDB_MODE: offline
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.6"
          enable-cache: true
      - run: uv sync --all-groups --frozen
      - run: uv run ruff check .
      - run: uv run mypy
      - run: uv run pytest -q
      - run: uv run doc2query doctor
